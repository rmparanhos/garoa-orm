name: Benchmark

# Relative performance benchmark: Garoa vs Dapper, with Dapper as the BenchmarkDotNet
# [Baseline]. Runs on push to main (not on PRs) so the ratio is tracked over time; results are
# published as an artifact and the build fails if Garoa regresses past the threshold.

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Garoa mean must stay within this multiple of Dapper's mean. See benchmarks/check_threshold.py.
  GAROA_BENCH_THRESHOLD: "1.30"

jobs:
  benchmark:
    name: Garoa vs Dapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run benchmarks
        working-directory: benchmarks/Garoa.Benchmarks
        run: dotnet run -c Release -- --filter '*' --exporters json markdown

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/Garoa.Benchmarks/BenchmarkDotNet.Artifacts/results/*

      - name: Enforce performance threshold
        run: >-
          python3 benchmarks/check_threshold.py
          benchmarks/Garoa.Benchmarks/BenchmarkDotNet.Artifacts/results
          --threshold "${GAROA_BENCH_THRESHOLD}"
